<div class="auth-wrapper">
  <div class="login-card glass-card">
    <div class="auth-header">
      <h2 class="title-text">FORGOT_PASSWORD</h2>
      <p class="tagline">DBDS_IRELAND // RESET_ACCESS</p>
    </div>

    <div class="auth-form">
      <div class="field">
        <label>REGISTERED_EMAIL</label>
        <input
          type="email"
          class="sharp-input"
          [(ngModel)]="email"
          placeholder="USER@DOMAIN.COM"
        />
      </div>

      <div *ngIf="error" class="msg-box error" (click)="error = ''">
        {{ error }}
      </div>
      <div *ngIf="message" class="msg-box success" (click)="message = ''">
        {{ message }}
      </div>

      <button
        class="btn-sharp w-100"
        (click)="submit()"
        [disabled]="loading"
      >
        <span *ngIf="loading" class="spinner-square-sm"></span>
        {{ loading ? 'SENDING...' : 'SEND_RESET_LINK' }}
      </button>

      <div class="text-center mt-3">
        <a routerLink="/login" class="link-text">REMEMBERED_PASSWORD?_LOGIN</a>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
