<div class="auth-wrapper">
  <div class="login-card glass-card">
    <div class="auth-header">
      <h2 class="title-text">RESET_PASSWORD</h2>
      <p class="tagline">DBDS_IRELAND // NEW_CREDENTIALS</p>
    </div>

    <div class="auth-form">
      <div *ngIf="!token" class="msg-box error">Invalid or missing reset token. Please request a new link.</div>

      <div class="field">
        <label>NEW_PASSWORD</label>
        <input type="password" class="sharp-input" [(ngModel)]="newPassword" placeholder="••••••••">
        <small class="text-muted">At least 8 characters, 1 uppercase &amp; 1 number</small>
      </div>
      <div class="field">
        <label>CONFIRM_PASSWORD</label>
        <input type="password" class="sharp-input" [(ngModel)]="confirmPassword" placeholder="••••••••">
      </div>

      <div *ngIf="error" class="msg-box error" (click)="error = ''">{{error}}</div>
      <div *ngIf="message" class="msg-box success" (click)="message = ''">{{message}}</div>

      <button class="btn-sharp w-100" (click)="submit()" [disabled]="loading || !token">
        {{loading ? 'RESETTING...' : 'RESET_PASSWORD'}}
      </button>

      <div class="text-center mt-3">
        <a routerLink="/login" class="link-text">BACK_TO_LOGIN</a>
      </div>
    </div>
  </div>
</div>
